    <meta charset="UTF-8">

    <title>Document</title>
    <style>
       * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #0f0f2e;
        color: white;
        font-family: 'Exo 2', sans-serif;

        display: flex;
        flex-direction: column;
        justify-content: center;   /* vertical center */
        align-items: center;       /* horizontal center */

        height: 100vh;
        margin: 0;
}

    .game-header {
      width: 100%;
      background: #1a1a40;
      border-bottom: 2px solid #6c63ff;
      text-align: center;
      padding: 22px 20px 16px;
    }

    .game-header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px;
      color: #a78bfa;
      letter-spacing: 3px;
    }

    .game-header p { color: #aaa; font-size: 13px; margin-top: 6px; }

    .back-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 12px;
      color: #aaa;
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #a78bfa; }

    .game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 80px;
    }

    .game-status {
      font-size: 18px;
      color: #a78bfa;
      margin-bottom: 24px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .game-input {
      padding: 11px 16px;
      font-size: 15px;
      font-family: 'Exo 2', sans-serif;
      background: transparent;
      border: 1px solid #6c63ff;
      border-radius: 8px;
      color: #fff;
      outline: none;
      width: 180px;
      text-align: center;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .game-input:focus { border-color: #a78bfa; box-shadow: 0 0 10px #a78bfa44; }
    .game-input::placeholder { color: #555; }

    .btn-row { display: flex; gap: 12px; margin-top: 18px; }

    .btn {
      padding: 11px 28px;
      font-size: 14px;
      font-family: 'Exo 2', sans-serif;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-primary { background: #6c63ff; color: #fff; }
    .btn-primary:hover { background: #a78bfa; transform: translateY(-2px); }

    .btn-secondary { background: transparent; color: #aaa; border: 1px solid #444; }
    .btn-secondary:hover { color: #a78bfa; border-color: #a78bfa; }

    .hint-text { color: #aaa; font-size: 14px; margin-top: 14px; }
    .attempts-text { color: #666; font-size: 13px; margin-top: 6px; }

    footer {
      background: #1a1a40;
      color: #aaa;
      text-align: center;
      padding: 14px;
      border-top: 1px solid #6c63ff;
      position: fixed;
      bottom: 0;
      width: 100%;
      font-size: 13px;
    }
    h1 {
  color: #a78bfa;
  margin-bottom: 10px;
}

p {
  color: #aaa;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #6c63ff;
  background: transparent;
  color: white;
  margin-bottom: 15px;
  text-align: center;
}

button {
  padding: 10px 20px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  background: #6c63ff;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #a78bfa;
}

<body>
    <h1>Guess a Number</h1>
    <p>Enter a Number Between 1 And 100</p>
    <input type="number" id="guess" placeholder="Enter No." min="1" max="100" onkeydown="if(event.key==='Enter') checkGuess()" size="30px">
    <button onclick="checkGuess()">Guess</button>
    <button onclick="resetGame()">New Game</button>
    <p id="message"></p>
    <p id="attempts"></p>
    <p id="hint"></p> 
    <script src="ng.js"></script>
