<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f2e;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h1 {
      font-size: 32px;
      color: #a78bfa;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    p {
      color: #aaa;
      font-size: 15px;
      margin-bottom: 30px;
    }

    .buttons {
    display: flex;
  flex-direction: row;   /* add this */
    gap: 20px;
    margin-bottom: 30px;
}

    .move_button {
      border: 2px solid #6c63ff;
      background: #1a1a40;
      padding: 25px;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .move_button:hover {
      transform: translateY(-6px);
      background: #2a2a60;
      box-shadow: 0 0 15px #6c63ff55;
    }

    .move_img {
      height: 50px;
    }

    .js_p_scores {
      font-size: 18px;
      color: #a78bfa;
      margin-bottom: 20px;
      text-align: center;
      line-height: 2;
    }

    .result {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      min-height: 28px;
    }

    .reset_button {
      padding: 10px 24px;
      font-size: 15px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .reset_button:hover {
      background: #a78bfa;
    }

    .home_button {
      margin-top: 15px;
      padding: 8px 20px;
      font-size: 14px;
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }

    .home_button:hover {
      color: #a78bfa;
      border-color: #a78bfa;
    }
    .move_button {
  display: inline-block;
}
    </style>
</head>
<body>
    
<p class="title">Rock Paper Scissors</p>

    <div style="display: flex; flex-direction: row; gap: 20px; justify-content: center; margin-bottom: 30px;">
  <button onclick="func('rock')" class="move_button">
    <img class="move_img" src="move_emojis/rock-emoji.png">
  </button>
  <button onclick="func('paper')" class="move_button">
    <img class="move_img" src="move_emojis/paper-emoji.png">
  </button>
  <button onclick="func('scissors')" class="move_button">
    <img class="move_img" src="move_emojis/scissors-emoji.png">
  </button>
</div>
<br><br>

<p class="js_p_scores"></p>


<br><br>

<button onclick="reset_scores()" class="reset_button">Reset Scores</button>

    <script src="rck_ppr_ssr.js"></script>  
    

</body>
</html>
