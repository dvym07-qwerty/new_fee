<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

         * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0f0f2e;
      color: white;
      min-height: 100vh;
    }

    header {
      background: #1a1a40;
      text-align: center;
      padding: 30px;
      border-bottom: 2px solid #6c63ff;
    }

    header h1 {
      font-size: 32px;
      color: #a78bfa;
      letter-spacing: 2px;
    }

    nav {
      background: #1a1a40;
      text-align: center;
      padding: 12px;
      border-bottom: 1px solid #6c63ff;
    }

    nav a {
      color: #ccc;
      margin: 0 15px;
      text-decoration: none;
      font-size: 15px;
    }

    nav a:hover {
      color: #a78bfa;
    }

    .container {
      text-align: center;
      padding: 50px 20px;
    }

    .container h2 {
      color: #a78bfa;
      margin-bottom: 30px;
    }

    /* .profile-grid {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    } */

    .card {
      background: #1a1a40;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 25px;
      width: 250px;
        min-width: 250px;      /* minimum size */
        width: fit-content;    /* grow based on content */
        max-width: 90%;        /* prevent going outside screen */

        text-align: center;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: #6c63ff;
      box-shadow: 0 0 15px #6c63ff33;
    }

    .card h3 {
      color: #a78bfa;
      margin-bottom: 10px;
    }

    .card p {
      color: #aaa;
      font-size: 14px;
      margin: 5px 0;
      word-wrap: break-word;
        overflow-wrap: break-word;
    }

    footer {
      background: #1a1a40;
      color: #aaa;
      text-align: center;
      padding: 15px;
      border-top: 1px solid #6c63ff;
      position: fixed;
      bottom: 0;
      width: 100%;
      font-size: 14px;
    }
    .card {
        text-align: center;
        width: 260px;
        max-width: 90%;
}
    .profile-grid {
        display: flex;
        flex-direction: column;   /* vertical */
        align-items: center;      /* center horizontally */
        gap: 25px;
}

    </style>
</head>
<body>
