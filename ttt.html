<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f2e;
      color: white;
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    

    

    .game-header {
      width: 100%;
      background: #1a1a40;
      border-bottom: 2px solid #6c63ff;
      text-align: center;
      padding: 22px 20px 16px;
    }

    .game-header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px;
      color: #a78bfa;
      letter-spacing: 3px;
    }

    .game-header p { color: #aaa; font-size: 13px; margin-top: 6px; }

    .back-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 12px;
      color: #aaa;
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #a78bfa; }

    .game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 80px;
    }

    .game-status {
      font-size: 18px;
      color: #a78bfa;
      margin-bottom: 24px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    #board {
      display: inline-grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 8px;
      margin-bottom: 28px;
    }

    .cell {
      width: 100px;
      height: 100px;
      background: #1a1a40;
      border: 2px solid #333;
      border-radius: 10px;
      font-size: 44px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .cell:hover { background: #22224e; border-color: #6c63ff; }
    .cell.x { color: #f472b6; }
    .cell.o { color: #34d399; }

    .btn {
      padding: 11px 28px;
      font-size: 14px;
      font-family: 'Exo 2', sans-serif;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-primary { background: #6c63ff; color: #fff; }
    .btn-primary:hover { background: #a78bfa; transform: translateY(-2px); }

    footer {
      background: #1a1a40;
      color: #aaa;
      text-align: center;
      padding: 14px;
      border-top: 1px solid #6c63ff;
      position: fixed;
      bottom: 0;
      width: 100%;
      font-size: 13px;
    }

    <body>

  <h1>Tic Tac Toe</h1>
  <p>You are <strong style="color:#e74c3c">X</strong> &nbsp;|&nbsp; Computer is <strong style="color:#2980b9">O</strong></p>
  <div id="status">Your turn</div>

  <div id="board">
    <div class="cell" onclick="play(0)"></div>
    <div class="cell" onclick="play(1)"></div>
    <div class="cell" onclick="play(2)"></div>
    <div class="cell" onclick="play(3)"></div>
    <div class="cell" onclick="play(4)"></div>
    <div class="cell" onclick="play(5)"></div>
    <div class="cell" onclick="play(6)"></div>
    <div class="cell" onclick="play(7)"></div>
    <div class="cell" onclick="play(8)"></div>
    </div>

  <br>
  <button id="reset" onclick="resetGame()">Restart</button>
